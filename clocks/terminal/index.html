<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERMINAL Clock - Web7 Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/common.css">
  <style>
    body {
      background: #0c0c0c;
    }

    .clock-container {
      background: #0c0c0c;
      align-items: flex-start;
      justify-content: flex-start;
      padding: clamp(24px, 5vw, 60px);
    }

    .terminal {
      width: 100%;
      max-width: 900px;
      font-family: 'JetBrains Mono', monospace;
    }

    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #1e1e1e;
      border-radius: 8px 8px 0 0;
      border: 1px solid #333;
      border-bottom: none;
    }

    .terminal-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .terminal-dot.red { background: #ff5f57; }
    .terminal-dot.yellow { background: #febc2e; }
    .terminal-dot.green { background: #28c840; }

    .terminal-title {
      color: #888;
      font-size: 12px;
      margin-left: 8px;
    }

    .terminal-body {
      background: #0c0c0c;
      border: 1px solid #333;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: clamp(16px, 3vw, 32px);
      min-height: 400px;
    }

    .line {
      margin-bottom: 4px;
      font-size: clamp(12px, 1.8vw, 16px);
      line-height: 1.8;
    }

    .prompt { color: #28c840; }
    .command { color: #e0e0e0; }
    .output { color: #888; }
    .highlight { color: #febc2e; }
    .cyan { color: #00d4ff; }
    .dim { color: #555; }

    .time-output {
      font-size: clamp(36px, 10vw, 100px);
      font-weight: 700;
      color: #28c840;
      text-shadow: 0 0 20px rgba(40, 200, 64, 0.3);
      line-height: 1.2;
      margin: 16px 0;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 1.2em;
      background: #28c840;
      animation: cursorBlink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 4px;
    }

    @keyframes cursorBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <a href="../../" class="back-link" style="color:rgba(40,200,64,0.3)">← COLLECTION</a>
  <button class="fullscreen-btn" onclick="toggleFullscreen()" aria-label="Toggle fullscreen"
    style="background:rgba(40,200,64,0.05);border-color:rgba(40,200,64,0.15);color:rgba(40,200,64,0.4)">
    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
  </button>

  <div class="clock-container">
    <div class="terminal">
      <div class="terminal-bar">
        <div class="terminal-dot red"></div>
        <div class="terminal-dot yellow"></div>
        <div class="terminal-dot green"></div>
        <span class="terminal-title">web7@clock ~ </span>
      </div>
      <div class="terminal-body">
        <div class="line"><span class="prompt">$</span> <span class="command">date --iso-8601</span></div>
        <div class="line output" id="date-line"></div>
        <div class="line"><span class="prompt">$</span> <span class="command">timedatectl | grep "Local time"</span></div>
        <div class="line time-output" id="time"></div>
        <div class="line"><span class="prompt">$</span> <span class="command">uptime -p</span></div>
        <div class="line output" id="uptime"></div>
        <div class="line"><span class="prompt">$</span> <span class="command">cat /proc/loadavg</span></div>
        <div class="line output" id="loadavg"></div>
        <div class="line"><span class="prompt">$</span> <span class="cursor"></span></div>
      </div>
    </div>
  </div>

  <script src="../../js/clock.js"></script>
  <script>
    const timeEl = document.getElementById('time');
    const dateLineEl = document.getElementById('date-line');
    const uptimeEl = document.getElementById('uptime');
    const loadavgEl = document.getElementById('loadavg');

    const startTime = Date.now();

    const clock = new DigitalClock(timeEl, {
      use24Hour: true,
      onTick(data, now) {
        timeEl.textContent = `${data.hours}:${data.minutes}:${data.seconds}`;

        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        dateLineEl.textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const upH = Math.floor(elapsed / 3600);
        const upM = Math.floor((elapsed % 3600) / 60);
        const upS = elapsed % 60;
        uptimeEl.textContent = `up ${upH} hours, ${upM} minutes, ${upS} seconds`;

        const load1 = (Math.sin(Date.now() / 10000) * 0.3 + 0.5).toFixed(2);
        const load2 = (Math.sin(Date.now() / 15000) * 0.2 + 0.4).toFixed(2);
        const load3 = (Math.sin(Date.now() / 20000) * 0.15 + 0.35).toFixed(2);
        loadavgEl.textContent = `${load1} ${load2} ${load3} 2/128 ${Math.floor(Math.random() * 9000 + 1000)}`;
      }
    });

    clock.start();
  </script>
</body>
</html>
