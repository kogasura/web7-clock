<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBER Clock - Web7 Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/common.css">
  <style>
    body {
      background: #0a0012;
    }

    .clock-container {
      background: radial-gradient(ellipse at center, #120020 0%, #0a0012 70%);
      position: relative;
      overflow: hidden;
    }

    /* Scan line */
    .clock-container::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(255, 0, 255, 0.015) 2px,
        rgba(255, 0, 255, 0.015) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Moving scan bar */
    .clock-container::after {
      content: '';
      position: fixed;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, rgba(255, 0, 255, 0.3), transparent);
      animation: scanBar 4s linear infinite;
      z-index: 10;
      pointer-events: none;
    }

    @keyframes scanBar {
      0% { top: -4px; }
      100% { top: 100%; }
    }

    .time-display {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(48px, 14vw, 180px);
      font-weight: 900;
      letter-spacing: 0.05em;
      position: relative;
      color: #ff00ff;
      text-shadow:
        0 0 10px #ff00ff,
        0 0 30px #ff00ff,
        0 0 60px #8800aa,
        3px 0 0 #00ffff,
        -3px 0 0 #ff0044;
      animation: cyberGlitch 3s infinite;
    }

    .time-sub {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(14px, 3vw, 36px);
      font-weight: 400;
      color: #00ffff;
      letter-spacing: 0.2em;
      margin-top: 8px;
      text-shadow: 0 0 10px #00ffff;
    }

    .date-display {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(11px, 2vw, 18px);
      font-weight: 400;
      color: rgba(255, 0, 255, 0.4);
      letter-spacing: 0.15em;
      margin-top: 24px;
    }

    @keyframes cyberGlitch {
      0%, 95%, 100% {
        text-shadow:
          0 0 10px #ff00ff,
          0 0 30px #ff00ff,
          0 0 60px #8800aa,
          3px 0 0 #00ffff,
          -3px 0 0 #ff0044;
        transform: translate(0);
      }
      96% {
        text-shadow:
          0 0 10px #ff00ff,
          0 0 30px #ff00ff,
          0 0 60px #8800aa,
          -5px 2px 0 #00ffff,
          5px -2px 0 #ff0044;
        transform: translate(-2px, 1px);
      }
      97% {
        text-shadow:
          0 0 10px #ff00ff,
          0 0 30px #ff00ff,
          0 0 60px #8800aa,
          5px -3px 0 #00ffff,
          -5px 3px 0 #ff0044;
        transform: translate(2px, -1px);
      }
    }

    .separator {
      animation: separatorBlink 1s step-end infinite;
    }

    @keyframes separatorBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.2; }
    }

    /* Corner decorations */
    .corner {
      position: fixed;
      width: 40px;
      height: 40px;
      border-color: rgba(255, 0, 255, 0.2);
      border-style: solid;
      border-width: 0;
    }
    .corner.tl { top: 20px; left: 20px; border-top-width: 2px; border-left-width: 2px; }
    .corner.tr { top: 20px; right: 20px; border-top-width: 2px; border-right-width: 2px; }
    .corner.bl { bottom: 20px; left: 20px; border-bottom-width: 2px; border-left-width: 2px; }
    .corner.br { bottom: 20px; right: 20px; border-bottom-width: 2px; border-right-width: 2px; }
  </style>
</head>
<body>
  <a href="../../" class="back-link" style="color:rgba(255,0,255,0.3)">← COLLECTION</a>
  <button class="fullscreen-btn" onclick="toggleFullscreen()" aria-label="Toggle fullscreen"
    style="background:rgba(255,0,255,0.05);border-color:rgba(255,0,255,0.2);color:rgba(255,0,255,0.4)">
    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
  </button>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="clock-container">
    <div class="time-display" id="time"></div>
    <div class="time-sub" id="seconds"></div>
    <div class="date-display" id="date"></div>
  </div>

  <script src="../../js/clock.js"></script>
  <script>
    const timeEl = document.getElementById('time');
    const secondsEl = document.getElementById('seconds');
    const dateEl = document.getElementById('date');

    const clock = new DigitalClock(timeEl, {
      showSeconds: false,
      use24Hour: true,
      onTick(data) {
        timeEl.innerHTML = `${data.hours}<span class="separator">:</span>${data.minutes}`;
        secondsEl.textContent = `${data.seconds}.${data.milliseconds}`;
        dateEl.textContent = `${data.date.year}.${data.date.month}.${data.date.day} // ${data.date.dayOfWeek}`;
      }
    });

    clock.start();
  </script>
</body>
</html>
